# =============================================================================
# bubblyVM -- GRUB2 Bootloader Configuration
# File: build/grub/grub.cfg
#
# This config is embedded into the bootable ISO and tells GRUB how to
# load the bubblyVM kernel.
#
# Boot entries:
#   1. bubblyVM (Normal)    -- Standard boot
#   2. bubblyVM (Debug)     -- Verbose serial output, debug symbols
#   3. bubblyVM (Recovery)  -- Minimal drivers, safe mode
#   4. Memory Test          -- Placeholder for memtest86+ (Tier 1+)
# =============================================================================

# Display GRUB menu for 5 seconds then auto-boot entry 0
set timeout=5
set default=0

# Load graphics support for menu (fallback to text if no framebuffer)
insmod all_video
insmod gfxterm
insmod font

# Try to use graphical terminal; fall back to serial if it fails
if loadfont /boot/grub/unicode.pf2; then
    terminal_output gfxterm
else
    terminal_output console
fi

# Route GRUB output to serial as well (COM1, 38400 baud)
terminal_input  console serial
terminal_output console serial
serial --unit=0 --speed=38400

# =============================================================================
# Boot Entry 0: Normal Boot
# =============================================================================
menuentry "bubblyVM v0.0.1 (Normal Boot)" --class os {
    insmod multiboot2
    multiboot2 /boot/kernel.elf bubblyvm.mode=normal
    boot
}

# =============================================================================
# Boot Entry 1: Debug Boot
# Extra serial verbosity, no quiet splash, debug symbols active
# =============================================================================
menuentry "bubblyVM v0.0.1 (Debug Boot)" --class os {
    insmod multiboot2
    multiboot2 /boot/kernel.elf bubblyvm.mode=debug bubblyvm.serial=verbose
    boot
}

# =============================================================================
# Boot Entry 2: Recovery Boot
# Minimal driver set, safe mode, no network, repair tools
# =============================================================================
menuentry "bubblyVM Recovery Mode" --class os {
    insmod multiboot2
    multiboot2 /boot/kernel.elf bubblyvm.mode=recovery bubblyvm.safe=1
    boot
}

# =============================================================================
# Boot Entry 3: Memory Test (placeholder -- requires memtest86+ in Tier 1)
# =============================================================================
menuentry "Memory Test (Not yet available)" --class memtest {
    echo "Memory test not yet installed. Press any key to return to menu."
    sleep 3
}
